name: Deploy to GitHub Pages

on:
  # Деплой при сливе в main.
  push:
    branches: [main]
  # И кнопкой из вкладки Actions, если нужно перевыкатить без коммита.
  workflow_dispatch:
  # Пересборка по вебхуку из админки бэкенда (Django шлёт repository_dispatch
  # при изменении каталога) — чтобы пререндеренные страницы товара и превью
  # для шеринга не отставали от базы. См. catalog/redeploy.py в divo_bot.
  repository_dispatch:
    types: [catalog-changed]

# Пушу в Pages нужны эти права; GITHUB_TOKEN по умолчанию их не даёт.
permissions:
  contents: read
  pages: write
  id-token: write

# Не отменяем уже идущий деплой — пусть докатится, лишние встают в очередь.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          # Сайт живёт на своём домене в корне, поэтому basePath не задаём:
          # префикс /divodivnoe тут привёл бы к 404 на всех ассетах.
          NEXT_PUBLIC_APP_URL: https://divodivnoe.com
          # Номер счётчика Яндекс.Метрики. Заводится как переменная репозитория
          # (Settings → Secrets and variables → Actions → Variables →
          # YM_COUNTER_ID). Пусто — Метрика не подключается.
          NEXT_PUBLIC_YM_COUNTER_ID: ${{ vars.YM_COUNTER_ID }}
        run: npm run build

      - name: Disable Jekyll
        # Pages прогоняет статику через Jekyll, а тот выкидывает папки,
        # начинающиеся с подчёркивания, — то есть весь _next. Без этого
        # файла сайт открывается без стилей и скриптов.
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
